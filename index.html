<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอใช้สถานที่ศูนย์ผู้สูงอายุ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        .logo-dot{width:70px;height:70px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Custom scrollbar for table container */
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        
        /* FullCalendar Customizations */
        .fc { font-family: 'Kanit', sans-serif; }
        .fc .fc-toolbar-title { font-size: 1.25rem !important; font-weight: 600 !important; color: #1f2937; }
        .fc .fc-button-primary { background-color: #4f46e5 !important; border-color: #4f46e5 !important; padding: 0.4rem 0.8rem !important; text-transform: capitalize !important; font-family: 'Kanit', sans-serif !important;}
        .fc .fc-button-primary:not(:disabled).fc-button-active, .fc .fc-button-primary:not(:disabled):active { background-color: #4338ca !important; }
        .fc-event { cursor: pointer; padding: 2px 4px; transition: transform 0.1s;}
        .fc-event:hover { transform: scale(1.02); z-index: 5;}
        .fc .fc-daygrid-event { font-size: 0.8rem; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <!--<div class="bg-white p-2 rounded-lg text-indigo-600">
                         <i class="fa-solid fa-calendar-check text-xl"></i> 
                        
                    </div> -->
                    <span class="logo-dot"><img src="https://img2.pic.in.th/logo--copy.png" alt="logoศูนย์ผู้สูงอายุ" class="logo-dot" /></span>
                    <span class="font-semibold text-white text-xl tracking-tight">ขอใช้สถานที่ศูนย์ผู้สูงอายุ</span>
                </div>
                <div>
                    <button onclick="loadBookings()" class="text-indigo-100 hover:text-white transition" title="รีเฟรชข้อมูล">
                        <i class="fa-solid fa-rotate-right text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-8">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-gray-800">
                        <i class="fa-solid fa-pen-to-square text-indigo-500"></i>
                        ฟอร์มขอใช้ศูนย์ผู้สูงอายุ
                    </h2>
                    
                    <form id="bookingForm" onsubmit="submitForm(event)" class="space-y-4">
                        <!-- ชื่อผู้จอง -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ขอ <span class="text-red-500">*</span></label>
                            <input type="text" id="name" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="ระบุชื่อ-นามสกุล">
                        </div>
                        
                        <!-- ห้องประชุม -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ห้องประชุม <span class="text-red-500">*</span></label>
                            <select id="room" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white">
                                <option value="" disabled selected>เลือกห้องที่ขอใช้...</option>
                                <option value="ห้องชั้น 1 (80 ท่าน)">ห้องชั้น 1 (ความจุ 80 ท่าน)</option>
                                <option value="ห้องชั้น 2 (35 ท่าน)">ห้องชั้น 2 (ความจุ 35 ท่าน)</option>
                            </select>
                        </div>

                        <!-- วันที่ -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">วันที่ต้องการจอง <span class="text-red-500">*</span></label>
                            <input type="date" id="date" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        </div>

                        <!-- เวลา -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">เวลาเริ่ม <span class="text-red-500">*</span></label>
                                <input type="time" id="startTime" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">เวลาสิ้นสุด <span class="text-red-500">*</span></label>
                                <input type="time" id="endTime" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                            </div>
                        </div>

                        <!-- วัตถุประสงค์ -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">วัตถุประสงค์ <span class="text-red-500">*</span></label>
                            <textarea id="purpose" rows="3" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition resize-none" placeholder="เช่น ประชุมประจำเดือนชมรมผู้สูงอายุราษฎร์อุทิศ"></textarea>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-sm">
                            <span id="btnText">ยืนยันการจอง</span>
                            <div id="btnSpinner" class="spinner hidden"></div>
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 h-full flex flex-col">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-semibold flex items-center gap-2 text-gray-800">
                            <i class="fa-solid fa-calendar-days text-indigo-500"></i>
                            ปฏิทินการจอง
                        </h2>
                    </div>

                    <!-- Loading State -->
                    <div id="tableLoading" class="flex-grow flex flex-col items-center justify-center py-12 text-gray-400">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mb-4"></div>
                        <p>กำลังโหลดปฏิทิน...</p>
                    </div>

                    <!-- Calendar Container (Replaces Table) -->
                    <div id="calendarContainer" class="hidden flex-grow w-full min-h-[550px]">
                        <div id="calendar" class="h-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 py-3 px-5 rounded-xl shadow-lg text-white font-medium pointer-events-none">
        <i id="toastIcon" class="fa-solid fa-circle-check text-xl"></i>
        <span id="toastMessage">แจ้งเตือน</span>
    </div>

    <!-- Event Detail Modal -->
    <div id="eventModal" class="fixed inset-0 z-50 hidden bg-black bg-opacity-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300" id="eventModalContent">
            <div class="bg-indigo-600 px-6 py-4 flex justify-between items-center">
                <h3 class="text-white font-semibold text-lg flex items-center gap-2">
                    <i class="fa-regular fa-calendar-check"></i> รายละเอียดการจอง
                </h3>
                <button onclick="closeModal()" class="text-indigo-100 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex items-start gap-3">
                    <div class="bg-indigo-50 p-2 rounded-lg text-indigo-600 mt-1"><i class="fa-solid fa-users"></i></div>
                    <div>
                        <p class="text-sm text-gray-500">ผู้จอง</p>
                        <p id="modalName" class="font-medium text-gray-800">-</p>
                    </div>
                </div>
                <div class="flex items-start gap-3">
                    <div class="bg-purple-50 p-2 rounded-lg text-purple-600 mt-1"><i class="fa-solid fa-door-open"></i></div>
                    <div>
                        <p class="text-sm text-gray-500">ห้อง</p>
                        <p id="modalRoom" class="font-medium text-gray-800">-</p>
                    </div>
                </div>
                <div class="flex items-start gap-3">
                    <div class="bg-emerald-50 p-2 rounded-lg text-emerald-600 mt-1"><i class="fa-regular fa-clock"></i></div>
                    <div>
                        <p class="text-sm text-gray-500">วันและเวลา</p>
                        <p id="modalTime" class="font-medium text-gray-800">-</p>
                    </div>
                </div>
                <div class="flex items-start gap-3">
                    <div class="bg-amber-50 p-2 rounded-lg text-amber-600 mt-1"><i class="fa-solid fa-bullseye"></i></div>
                    <div>
                        <p class="text-sm text-gray-500">วัตถุประสงค์</p>
                        <p id="modalPurpose" class="font-medium text-gray-800 whitespace-pre-wrap">-</p>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-4 flex justify-end">
                <button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-medium transition">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznmCMhkC6kCsBqB1tiVlGTyotv-Fm7C46enBQ3rkMneQcn5ohrYb30Zj6OX0WGxU0z/exec';

        // กำหนดวันที่เริ่มต้นในฟอร์มเป็นวันนี้
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').setAttribute('min', today);
            document.getElementById('date').value = today;
            
            // โหลดข้อมูลทันทีเมื่อเปิดหน้า
            loadBookings();
        });

        // ฟังก์ชันแสดง Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toastMessage.textContent = message;
            
            if (type === 'success') {
                toast.className = "fixed bottom-5 right-5 transform translate-y-0 opacity-100 transition-all duration-300 z-50 flex items-center gap-3 py-3 px-5 rounded-xl shadow-xl text-white font-medium bg-emerald-500";
                toastIcon.className = "fa-solid fa-circle-check text-xl";
            } else {
                toast.className = "fixed bottom-5 right-5 transform translate-y-0 opacity-100 transition-all duration-300 z-50 flex items-center gap-3 py-3 px-5 rounded-xl shadow-xl text-white font-medium bg-red-500";
                toastIcon.className = "fa-solid fa-circle-exclamation text-xl";
            }

            // ซ่อนอัตโนมัติหลังจาก 4 วินาที
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 4000);
        }

        // ตรวจสอบความถูกต้องของเวลาก่อนส่ง
        function validateTime() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            
            if (start && end && start >= end) {
                showToast('เวลาสิ้นสุดต้องมากกว่าเวลาเริ่ม', 'error');
                return false;
            }
            return true;
        }

        // จัดการเมื่อกดปุ่ม Submit ฟอร์ม
function submitForm(event) {
            event.preventDefault();
            
            if (!validateTime()) return;

            const formData = {
                name: document.getElementById('name').value.trim(),
                room: document.getElementById('room').value,
                date: document.getElementById('date').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                purpose: document.getElementById('purpose').value.trim()
            };

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = 'กำลังบันทึก...';
            btnSpinner.classList.remove('hidden');

            // ใช้ fetch ส่งข้อมูลไปยัง Google Apps Script
            fetch(SCRIPT_URL, {
                method: 'POST',
                redirect: 'follow', // จำเป็นสำหรับ GAS
                body: JSON.stringify(formData),
                headers: {
                    // ใช้ text/plain เพื่อเลี่ยงปัญหา CORS Preflight ของฝั่ง Google
                    'Content-Type': 'text/plain;charset=utf-8',
                }
            })
            .then(response => response.json())
            .then(response => {
                resetButtonState();
                if (response.success) {
                    showToast(response.message, 'success');
                    document.getElementById('bookingForm').reset();
                    document.getElementById('date').value = new Date().toISOString().split('T')[0];
                    loadBookings();
                } else {
                    showToast(response.message, 'error');
                }
            })
            .catch(error => {
                resetButtonState();
                showToast('เกิดข้อผิดพลาดในการเชื่อมต่อระบบ', 'error');
                console.error(error);
            });
        }

        function resetButtonState() {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = false;
            btn.classList.remove('opacity-80', 'cursor-not-allowed');
            btnText.textContent = 'ยืนยันการจอง';
            btnSpinner.classList.add('hidden');
        }

        // โหลดข้อมูลการจองมาแสดงผล
function loadBookings() {
            const loadingObj = document.getElementById('tableLoading');
            const calendarContainer = document.getElementById('calendarContainer');
            
            loadingObj.classList.remove('hidden');
            if(calendarContainer) calendarContainer.classList.add('hidden');

            // ใช้ fetch ดึงข้อมูลจาก Google Apps Script
            fetch(SCRIPT_URL + '?action=getBookings')
            .then(response => response.json())
            .then(data => {
                loadingObj.classList.add('hidden');
                renderCalendar(data);
            })
            .catch(error => {
                loadingObj.classList.add('hidden');
                showToast('ไม่สามารถดึงข้อมูลได้', 'error');
                if(calendarContainer) calendarContainer.classList.remove('hidden');
                console.error(error);
            });
        }

        let calendar; // ตัวแปรเก็บ instance ของ FullCalendar

        // สร้าง Calendar จาก Data (แทนที่ renderTable เดิม)
        function renderCalendar(data) {
            const calendarContainer = document.getElementById('calendarContainer');
            calendarContainer.classList.remove('hidden');

            // 1. แปลงข้อมูลให้อยู่ในรูปแบบ Events ที่ FullCalendar ต้องการ
            const events = data.map(booking => {
                // กำหนดสีตามห้องประชุม
                let bgColor = '#4f46e5'; // Indigo default
                if (booking.room.includes('Room A')) bgColor = '#3b82f6'; // Blue
                else if (booking.room.includes('Room B')) bgColor = '#9333ea'; // Purple
                else if (booking.room.includes('Boardroom')) bgColor = '#d97706'; // Amber

                return {
                    title: `${booking.room} - ${booking.name}`, // ข้อความที่แสดงบนปฏิทิน
                    start: `${booking.date}T${booking.startTime}:00`, // วันเวลาเริ่ม
                    end: `${booking.date}T${booking.endTime}:00`,     // วันเวลาสิ้นสุด
                    backgroundColor: bgColor,
                    borderColor: bgColor,
                    extendedProps: {
                        name: booking.name,
                        room: booking.room,
                        purpose: booking.purpose,
                        displayTime: `${booking.startTime} - ${booking.endTime} น.`
                    }
                };
            });

            var calendarEl = document.getElementById('calendar');

            // 2. โหลดปฏิทิน
            if (calendar) {
                // ถ้ามีปฏิทินอยู่แล้ว ให้ลบข้อมูลเก่าและใส่ข้อมูลใหม่ (Refresh Data)
                calendar.removeAllEvents();
                calendar.addEventSource(events);
            } else {
                // สร้างปฏิทินใหม่ (First Load)
                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: window.innerWidth < 768 ? 'listMonth' : 'dayGridMonth', // มือถือให้แสดงเป็น List อัตโนมัติ
                    headerToolbar: {
                        left: 'prev,next',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,listMonth'
                    },
                    buttonText: {
                        month: 'เดือน',
                        week: 'สัปดาห์',
                        list: 'รายการ'
                    },
                    locale: 'th', // ใช้ภาษาไทย
                    events: events, // ใส่ข้อมูลที่แปลงแล้ว
                    height: '100%',
                    eventClick: function(info) {
                        // เมื่อคลิกที่ event ให้เปิด Modal แสดงรายละเอียด
                        openModal(info.event);
                    }
                });
                calendar.render();
            }
        }

        // ฟังก์ชันจัดการ Modal เพื่อแสดงรายละเอียด
        function openModal(event) {
            const modal = document.getElementById('eventModal');
            const modalContent = document.getElementById('eventModalContent');
            
            // ดึงข้อมูลจาก event มาใส่ใน Modal
            document.getElementById('modalName').textContent = event.extendedProps.name;
            document.getElementById('modalRoom').textContent = event.extendedProps.room;
            
            // Format วันที่ให้สวยงาม
            const dateObj = new Date(event.start);
            const displayDate = dateObj.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });
            
            document.getElementById('modalTime').textContent = `${displayDate} | ${event.extendedProps.displayTime}`;
            document.getElementById('modalPurpose').textContent = event.extendedProps.purpose;

            // Animate การแสดง Modal
            modal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('eventModal');
            const modalContent = document.getElementById('eventModalContent');
            
            // Animate การปิด Modal
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
    </script>
</body>
</html>
